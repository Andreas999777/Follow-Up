<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Responsive App</title>
    <style>
        /* Mobile styles */
        @media (max-width: 600px) {
            body {
                font-size: 16px;
                padding: 10px;
            }
            .sidebar {
                display: none;
            }
            .hamburger {
                display: block;
            }
            .button,
            input {
                width: 100%;
            }
            .container {
                flex-direction: column;
            }
        }
        /* Default styles for desktop and larger screens */
        .container {
            display: flex;
            justify-content: space-between;
        }
        .button,
        input {
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Sidebar</h2>
        </div>
        <div class="main-content">
            <h1>Welcome to the App</h1>
            <button class="button">Click Me</button>
            <input type="text" placeholder="Enter text" />
        </div>
        <div class="hamburger" style="display: none;">
            <span>☰</span>
        </div>
    </div>
</body>
</html>
