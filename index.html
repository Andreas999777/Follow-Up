<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Follow-up Tool Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #3498db;
            --theme-dark: #2980b9;
            --sidebar-dark: #2C3E50;
            --bg-light: #F8FAF7;
            --border-col: #E0E0E0;
            --danger-red: #e74c3c;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- Sidebar --- */
        #sidebar { width: 320px; background: var(--sidebar-dark); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; }
        .coach-selector-box { padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 3px solid var(--theme-color); transition: border-color 0.3s; }
        .coach-selector-box label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--theme-color); font-weight: 700; transition: color 0.3s;}
        .coach-select { width: 100%; padding: 12px; border-radius: 8px; border: none; background: white; font-family: inherit; font-weight: 600; font-size: 1rem; cursor: pointer; outline: none; }

        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;}
        .sidebar-header h2 { margin: 0; font-size: 1.1rem; }
        
        .sidebar-actions { padding: 20px; }
        .new-client-btn { width: 100%; padding: 12px; background: var(--theme-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; margin-bottom: 15px; }
        .new-client-btn:hover { filter: brightness(1.1); }
        .search-bar { width: 100%; padding: 10px; border: none; border-radius: 6px; box-sizing: border-box; font-family: inherit; background: rgba(255,255,255,0.1); color: white; outline: none; }

        #client-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .client-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center;}
        .client-item:hover { background: rgba(255,255,255,0.1); }
        .client-item.active { background: var(--theme-color); color: white; font-weight: bold; }
        .badges { display: flex; gap: 5px; }
        .badge { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 0.75rem; background: rgba(255,255,255,0.2); }
        .badge.alert { background: #e74c3c; color: white; font-weight: bold; animation: pulse 2s infinite;}

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Main Content --- */
        #main-content { flex: 1; display: flex; flex-direction: column; background: white; }
        #empty-state { display: flex; flex: 1; align-items: center; justify-content: center; flex-direction: column; color: #555; font-size: 1.2rem; }
        #welcome-msg { font-size: 2.5rem; color: var(--theme-color); margin-bottom: 10px; }
        #workspace { display: none; flex-direction: column; height: 100%; }
        
        .client-header { padding: 20px 40px; background: #fff; border-bottom: 1px solid var(--border-col); display: flex; justify-content: space-between; align-items: center; }
        .client-header-info h1 { margin: 0; font-size: 1.8rem; color: #333; }
        .client-meta { color: #666; font-size: 0.9rem; margin-top: 5px; display: flex; align-items: center; gap: 15px; }
        
        .btn-wa { background: #25D366; color: white; padding: 4px 10px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        .btn-wa:hover { background: #1ebd5a; }

        .delete-btn { background: transparent; color: var(--danger-red); border: 1px solid var(--danger-red); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; font-family: inherit;}
        .delete-btn:hover { background: var(--danger-red); color: white; }

        .sticky-info-bar { background: #fdfdfd; padding: 15px 40px; border-bottom: 1px solid var(--border-col); font-size: 0.9rem; color: #444; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-block strong { color: var(--theme-color); display: block; margin-bottom: 5px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;}

        .tabs { display: flex; background: #f1f1f1; border-bottom: 2px solid var(--border-col); padding: 0 40px; }
        .tab-btn { padding: 15px 20px; border: none; background: transparent; font-family: inherit; font-weight: 600; color: #555; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: var(--theme-color); border-bottom-color: var(--theme-color); }

        .tab-content { display: none; flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-light); }
        .tab-content.active { display: block; }

        .form-section { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        .form-section h3 { margin-top: 0; color: var(--sidebar-dark); border-left: 4px solid var(--theme-color); padding-left: 10px; }

        .question-row { display: flex; flex-direction: column; margin-bottom: 20px; }
        .question-row label { font-weight: 600; margin-bottom: 5px; color: #444; font-size: 0.95rem; }
        .question-row textarea, .question-row input { padding: 12px; border: 1px solid var(--border-col); border-radius: 6px; font-family: inherit; font-size: 0.9rem; background: #fafafa; }
        .coach-note { font-size: 0.82rem; color: #777; margin-top: 6px; font-style: italic; border-left: 2px solid var(--theme-color); padding-left: 8px; line-height: 1.4; }
        
        .notes-area { margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .notes-area label { color: var(--theme-color); font-size: 1.1rem; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #444; cursor: pointer; }
        .check-item input { margin: 0; cursor: pointer; }

        .highlight-box { background: #fff8e1; border-left: 4px solid #f39c12; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .highlight-box h4 { margin: 0 0 10px 0; color: #d35400; }
        .symptom-tag { display: inline-block; background: white; border: 1px solid #f39c12; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; margin: 2px; }
    </style>
</head>
<body>

    <!-- === HTML blijft exact hetzelfde === -->
    <div id="sidebar"> ... (je originele sidebar) ... </div>
    <div id="main-content"> ... (je volledige main content met alle tabs) ... </div>

    <!-- ====================== FIREBASE + LOGICA ====================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            deleteDoc,
            onSnapshot,
            collection,
            query 
        } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9xhQuLnjgbaMHZI_vWp4FoUUjTNbA0tM",
            authDomain: "follow-up-coaches.firebaseapp.com",
            projectId: "follow-up-coaches",
            storageBucket: "follow-up-coaches.firebasestorage.app",
            messagingSenderId: "273305831461",
            appId: "1:273305831461:web:4471b563a5d0da164457cc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURATIE
        const symptomList = [ /* jouw volledige lijst */ 
            "Energiegebrek", "Regelmatig verkouden", "Hoofdpijn / Migraine", "Spierkrampen", "Spierpijn",
            "Vocht vasthouden", "Angst / Paniek", "Brandend maagzuur", "Stoelgang problemen", "Concentratieverlies",
            "Vergeetachtigheid", "Onzeker zijn", "Minder aankunnen", "Negatieve gedachten", "Snel geïrriteerd",
            "Zin in zoet", "Ontstekingen", "Gewrichtspijn", "Hartkloppingen", "Droge huid / Acné",
            "Trage wondgenezing", "Haarverlies", "Wazig zicht", "Broze nagels", "Schimmelinfectie",
            "Allergieën", "Bloedend tandvlees", "Koortsblaasjes", "Veel dorst/plassen", "Slechte slaper"
        ];

        const productList = [ /* jouw volledige lijst */ 
            "F1 Shake (Smaak naar keuze)", "Proteïnedrankmix (PDM)", "Vegan PDM", "Tri Blend Select",
            "Herbal Aloë Drank (Mango/Original/Max)", "Instant Theedrank (50g/100g)", "Multivezel Drank",
            "Microbiotic Max", "Immune Booster", "Phyto Complete", "Formula 2 (Vrouwen/Mannen)",
            "Xtra-Cal", "Herbalifeline Max", "Beta Heart", "Night Mode", "Active Mind Complex",
            "H24 Rebuild Strength", "H24 LiftOff Max", "H24 CR7 Drive", "H24 Hydrate",
            "Proteïne Chips", "Proteïnereep (Express/Gewoon)", "SKIN Collageen Booster", "SKIN / Aloë Verzorging"
        ];

        let currentCoach = localStorage.getItem('lastActiveCoach') || 'Andreas';
        let clients = {};
        let currentClientId = null;
        let unsubscribeSnapshot = null;

        function init() {
            document.getElementById('coach-selector').value = currentCoach;
            applyTheme();
            generateCheckboxes();
            loadCoachDataFromFirebase();
        }

        function loadCoachDataFromFirebase() {
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            const q = query(collection(db, "coaches", currentCoach, "clients"));
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                clients = {};
                snapshot.forEach((d) => clients[d.id] = d.data());
                renderSidebar();
                if (currentClientId && clients[currentClientId]) loadClientData();
            });
        }

        async function saveClientToFirebase(clientId) {
            if (!clientId) return;
            try {
                await setDoc(doc(db, "coaches", currentCoach, "clients", clientId), clients[clientId], { merge: true });
            } catch (e) { console.error(e); }
        }

        // ====================== ALLE FUNCTIES (nu globaal) ======================
        function applyTheme() {
            const root = document.documentElement;
            if (currentCoach === 'Andreas') {
                root.style.setProperty('--theme-color', '#3498db');
                root.style.setProperty('--theme-dark', '#2980b9');
            } else if (currentCoach === 'Silvia') {
                root.style.setProperty('--theme-color', '#f39c12');
                root.style.setProperty('--theme-dark', '#e67e22');
            } else {
                root.style.setProperty('--theme-color', '#7AC142');
                root.style.setProperty('--theme-dark', '#65a136');
            }
            document.getElementById('welcome-msg').innerText = `Welkom ${currentCoach}`;
        }

        function switchCoach() {
            currentCoach = document.getElementById('coach-selector').value;
            localStorage.setItem('lastActiveCoach', currentCoach);
            applyTheme();
            currentClientId = null;
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('empty-state').style.display = 'flex';
            loadCoachDataFromFirebase();
        }

        function generateCheckboxes() {
            const symGrid = document.getElementById('symptoms-grid');
            symGrid.innerHTML = '';
            symptomList.forEach((s, idx) => {
                symGrid.innerHTML += `<label class="check-item"><input type="checkbox" id="symp_${idx}" onchange="saveCheckboxes()"> ${s}</label>`;
            });

            const prodGrid = document.getElementById('products-grid');
            prodGrid.innerHTML = '';
            productList.forEach((p, idx) => {
                prodGrid.innerHTML += `<label class="check-item"><input type="checkbox" id="prod_${idx}" onchange="saveCheckboxes()"> ${p}</label>`;
            });
        }

        async function saveCheckboxes() {
            if (!currentClientId) return;
            let checkedSymp = symptomList.filter((_, i) => document.getElementById(`symp_${i}`).checked);
            let checkedProd = productList.filter((_, i) => document.getElementById(`prod_${i}`).checked);
            clients[currentClientId].symptoms = checkedSymp;
            clients[currentClientId].products = checkedProd;
            await saveClientToFirebase(currentClientId);
            updateStickyInfo();
            updateWeek2Symptoms();
        }

        function loadCheckboxes() {
            if (!currentClientId) return;
            const data = clients[currentClientId];
            symptomList.forEach((s, i) => {
                const el = document.getElementById(`symp_${i}`);
                if (el) el.checked = (data.symptoms || []).includes(s);
            });
            productList.forEach((p, i) => {
                const el = document.getElementById(`prod_${i}`);
                if (el) el.checked = (data.products || []).includes(p);
            });
        }

        function createNewClient() {
            const newId = 'client_' + Date.now();
            clients[newId] = { fiche: {name: 'Nieuwe Klant'}, symptoms: [], products: [], dag1: {}, dag3: {}, dag7: {}, week2: {}, week3: {} };
            
            saveClientToFirebase(newId).then(() => {
                renderSidebar();
                selectClient(newId);
            });
        }

        function deleteClient() {
            if (currentClientId && confirm('Weet je zeker dat je deze klant wilt verwijderen?')) {
                deleteDoc(doc(db, "coaches", currentCoach, "clients", currentClientId))
                    .then(() => {
                        currentClientId = null;
                        document.getElementById('workspace').style.display = 'none';
                        document.getElementById('empty-state').style.display = 'flex';
                        renderSidebar();
                    });
            }
        }

        function selectClient(id) {
            currentClientId = id;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('workspace').style.display = 'flex';
            renderSidebar();
            openTab('tab-fiche');
            loadClientData();
        }

        function loadClientData() {
            const data = clients[currentClientId] || {};
            document.getElementById('header-client-name').innerText = data.fiche?.name || 'Naamloos';
            document.getElementById('header-client-phone').innerText = data.fiche?.phone || '';

            const ficheFields = ['name','phone','startdate','birthdate','why','notes'];
            ficheFields.forEach(f => {
                const el = document.getElementById(`fiche-${f}`);
                if (el) el.value = data.fiche?.[f] || '';
            });

            const sections = ['dag1','dag3','dag7','week2','week3'];
            sections.forEach(s => {
                const pre = s.includes('week') ? 'w' + s.replace('week','') : 'd' + s.replace('dag','');
                for (let i = 1; i <= 8; i++) {
                    const el = document.getElementById(`${pre}-q${i}`);
                    if (el) el.value = data[s]?.[`q${i}`] || '';
                }
                const nEl = document.getElementById(`${pre}-notes`);
                if (nEl) nEl.value = data[s]?.notes || '';
            });

            loadCheckboxes();
            updateStickyInfo();
            updateWhatsApp();
            updateWeek2Symptoms();
        }

        async function autoSave(section, field) {
            if (!currentClientId) return;
            const pre = section === 'fiche' ? 'fiche' : (section.includes('week') ? 'w' + section.replace('week','') : 'd' + section.replace('dag',''));
            const val = document.getElementById(`${pre}-${field}`).value;

            if (!clients[currentClientId][section]) clients[currentClientId][section] = {};
            clients[currentClientId][section][field] = val;
            await saveClientToFirebase(currentClientId);
        }

        function updateStickyInfo() {
            if (!currentClientId) return;
            const data = clients[currentClientId];
            document.getElementById('sticky-why').innerText = data.fiche?.why || 'Nog niet ingevuld...';
            document.getElementById('sticky-products').innerText = (data.products && data.products.length) ? data.products.join(', ') : 'Geen producten geselecteerd...';
        }

        function updateWeek2Symptoms() {
            if (!currentClientId) return;
            const data = clients[currentClientId];
            const box = document.getElementById('w2-symptoms-box');
            const list = document.getElementById('w2-symptoms-list');
            if (data.symptoms && data.symptoms.length) {
                box.style.display = 'block';
                list.innerHTML = data.symptoms.map(s => `<span class="symptom-tag">${s}</span>`).join(' ');
            } else box.style.display = 'none';
        }

        function updateWhatsApp() {
            const phone = document.getElementById('fiche-phone').value.replace(/\D/g,'');
            const btn = document.getElementById('wa-btn');
            if (phone.length >= 9) {
                btn.style.display = 'inline-block';
                btn.href = `https://wa.me/${phone.startsWith('0') ? '32' + phone.slice(1) : phone}`;
            } else btn.style.display = 'none';
        }

        function updateSidebarName() {
            if (!currentClientId) return;
            document.getElementById('header-client-name').innerText = document.getElementById('fiche-name').value || 'Naamloos';
            renderSidebar();
        }

        function filterClients() {
            const q = document.getElementById('search-client').value.toLowerCase();
            document.querySelectorAll('.client-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function checkAlerts(data) {
            let alerts = { birthday: false, followup: false, badgeText: '' };
            let today = new Date(); today.setHours(0,0,0,0);
            if (data.fiche?.birthdate) {
                let bd = new Date(data.fiche.birthdate);
                if (bd.getDate() === today.getDate() && bd.getMonth() === today.getMonth()) alerts.birthday = true;
            }
            if (data.fiche?.startdate) {
                let sd = new Date(data.fiche.startdate); sd.setHours(0,0,0,0);
                let diff = Math.round((today - sd) / (86400000));
                if (diff === 1) { alerts.followup = true; alerts.badgeText = 'D1'; }
                else if (diff === 3) { alerts.followup = true; alerts.badgeText = 'D3'; }
                else if (diff === 7) { alerts.followup = true; alerts.badgeText = 'D7'; }
                else if (diff === 14) { alerts.followup = true; alerts.badgeText = 'W2'; }
                else if (diff === 21) { alerts.followup = true; alerts.badgeText = 'W3'; }
                else if (diff > 21 && diff % 30 === 0) { alerts.followup = true; alerts.badgeText = 'Maand'; }
            }
            return alerts;
        }

        function renderSidebar() {
            const list = document.getElementById('client-list');
            list.innerHTML = '';
            let arr = Object.keys(clients).map(id => ({id, data: clients[id], alerts: checkAlerts(clients[id])}));
            arr.sort((a,b) => (b.alerts.birthday || b.alerts.followup ? 1 : 0) - (a.alerts.birthday || a.alerts.followup ? 1 : 0) || b.id.localeCompare(a.id));

            arr.forEach(c => {
                const li = document.createElement('li');
                li.className = `client-item${c.id === currentClientId ? ' active' : ''}`;
                let badges = `<div class="badges">`;
                if (c.alerts.birthday) badges += `<div class="badge" title="Jarig Vandaag!">🎂</div>`;
                if (c.alerts.followup) badges += `<div class="badge alert" title="Opvolgmoment!">${c.alerts.badgeText}</div>`;
                badges += `</div>`;
                li.innerHTML = `<span>${c.data.fiche?.name || 'Naamloos'}</span>${badges}`;
                li.onclick = () => selectClient(c.id);
                list.appendChild(li);
            });
            filterClients();
        }

        function openTab(tabId, event) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
        }

        // Maak alle functies globaal zodat onclick/oninput werken
        window.init = init;
        window.switchCoach = switchCoach;
        window.createNewClient = createNewClient;
        window.deleteClient = deleteClient;
        window.filterClients = filterClients;
        window.autoSave = autoSave;
        window.saveCheckboxes = saveCheckboxes;
        window.updateSidebarName = updateSidebarName;
        window.updateWhatsApp = updateWhatsApp;
        window.renderSidebar = renderSidebar;
        window.openTab = openTab;
        window.selectClient = selectClient;
        window.loadClientData = loadClientData;
        window.updateStickyInfo = updateStickyInfo;
        window.updateWeek2Symptoms = updateWeek2Symptoms;
        window.applyTheme = applyTheme;
        window.generateCheckboxes = generateCheckboxes;

        window.onload = init;
    </script>
</body>
</html>
