<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Follow-up Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --theme-color: #3498db; --sidebar-dark: #2C3E50; --bg-light: #F8FAF7; --danger-red: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; color: white; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 12px; text-align: center; width: 300px;}
        .pin-input { font-size: 2rem; width: 100%; text-align: center; letter-spacing: 10px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; outline: none; }
        #sidebar { width: 300px; background: var(--sidebar-dark); color: white; display: flex; flex-direction: column; }
        .coach-select { width: 90%; margin: 10px auto; padding: 10px; border-radius: 5px; font-weight: bold; }
        .btn-action { width: 90%; margin: 5px auto; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #client-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; }
        .client-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .client-item.active { background: var(--theme-color); }
        #main-content { flex: 1; background: white; overflow-y: auto; position: relative; }
        .view-section { display: none; padding: 30px; }
        .view-section.active { display: block; }
        .dash-table { width: 100%; border-collapse: collapse; }
        .dash-table th, .dash-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .alert-row { background: #ffeaea; color: var(--danger-red); font-weight: bold; }
        .wa-btn { background: #25D366; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Pincode: 2026</h2>
            <input type="password" id="pin-input" class="pin-input" maxlength="4">
            <button class="btn-action" style="background:var(--theme-color); color:white;" onclick="checkPin()">Inloggen</button>
        </div>
    </div>

    <div id="sidebar">
        <select id="coach-selector" class="coach-select" onchange="switchCoach()">
            <option value="Andreas">Andreas (Blauw)</option>
            <option value="Thalyssa">Thalyssa (Groen)</option>
            <option value="Silvia">Silvia (Oranje)</option>
        </select>
        <button class="btn-action" style="background:#fff;" onclick="openView('dashboard-view')">📊 Dashboard</button>
        <button class="btn-action" style="background:var(--theme-color); color:white;" onclick="createNewClient()">+ Nieuwe Klant</button>
        <ul id="client-list"></ul>
    </div>

    <div id="main-content">
        <div id="empty-state" class="view-section active">
            <h2>Welkom Coach</h2>
            <p>Selecteer een klant of bekijk het dashboard.</p>
        </div>

        <div id="dashboard-view" class="view-section">
            <h2>Dashboard (Rood = 20+ dagen)</h2>
            <table class="dash-table">
                <thead><tr><th>Klant</th><th>Coach</th><th>Dagen</th></tr></thead>
                <tbody id="dashboard-tbody"></tbody>
            </table>
        </div>

        <div id="workspace" class="view-section">
            <h1 id="h-name">Klant</h1>
            <p id="h-phone">-</p>
            <hr>
            <div style="margin-bottom:20px;">
                <label><b>Telefoon:</b></label><br>
                <input type="text" id="f-phone" style="padding:10px; width:200px;" oninput="save('fiche','phone',this.value)">
                <button class="wa-btn" onclick="sendWA('dag1')">Stuur Dag 1 (WA)</button>
            </div>
            <div style="margin-bottom:20px;">
                <label><b>Startdatum:</b></label><br>
                <input type="date" id="f-start" style="padding:10px;" oninput="save('fiche','startdate',this.value)">
            </div>
            <button class="btn-action" style="background:var(--danger-red); color:white; width:auto;" onclick="deleteClient()">Verwijder deze klant</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD9xhQuLnjgbaMHZI_vWp4FoUUjTNbA0tM",
            authDomain: "follow-up-coaches.firebaseapp.com",
            projectId: "follow-up-coaches",
            storageBucket: "follow-up-coaches.firebasestorage.app",
            messagingSenderId: "273305831461",
            appId: "1:273305831461:web:4471b563a5d0da164457cc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentCoach = localStorage.getItem('coach') || 'Andreas';
        let clients = {};
        let currentId = null;

        function checkPin() {
            if(document.getElementById('pin-input').value === '2026') {
                document.getElementById('login-screen').style.display = 'none';
                localStorage.setItem('authed', 'true');
            }
        }
        if(localStorage.getItem('authed') === 'true') document.getElementById('login-screen').style.display = 'none';

        function init() {
            document.getElementById('coach-selector').value = currentCoach;
            db.collection("clients").onSnapshot(snap => {
                clients = {};
                snap.forEach(doc => clients[doc.id] = doc.data());
                renderSidebar();
                renderDashboard();
            });
        }

        function renderSidebar() {
            const list = document.getElementById('client-list');
            list.innerHTML = '';
            for(let id in clients) {
                let c = clients[id];
                if(c.coach !== currentCoach) continue;
                list.innerHTML += `<li class="client-item ${id===currentId?'active':''}" onclick="selectClient('${id}')">${c.fiche.name || 'Naamloos'}</li>`;
            }
        }

        function selectClient(id) {
            currentId = id;
            const c = clients[id];
            openView('workspace');
            document.getElementById('h-name').innerText = c.fiche.name || 'Naamloos';
            document.getElementById('f-phone').value = c.fiche.phone || '';
            document.getElementById('f-start').value = c.fiche.startdate || '';
            renderSidebar();
        }

        function save(sec, key, val) {
            if(!currentId) return;
            clients[currentId][sec][key] = val;
            db.collection("clients").doc(currentId).set(clients[currentId], {merge:true});
        }

        function createNewClient() {
            const name = prompt("Naam van de nieuwe klant?");
            if(!name) return;
            const id = "c_" + Date.now();
            db.collection("clients").doc(id).set({ coach: currentCoach, fiche: {name: name, phone:'', startdate:''}, products:[] });
        }

        function deleteClient() {
            if(confirm("Klant definitief verwijderen?") && currentId) {
                db.collection("clients").doc(currentId).delete();
                openView('empty-state');
            }
        }

        function openView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function switchCoach() {
            currentCoach = document.getElementById('coach-selector').value;
            localStorage.setItem('coach', currentCoach);
            renderSidebar();
        }

        function renderDashboard() {
            const tbody = document.getElementById('dashboard-tbody');
            tbody.innerHTML = '';
            for(let id in clients) {
                let c = clients[id];
                let diff = "-";
                if(c.fiche.startdate) {
                    diff = Math.floor((new Date() - new Date(c.fiche.startdate)) / (1000*60*60*24));
                }
                tbody.innerHTML += `<tr class="${diff >= 20 ? 'alert-row' : ''}"><td>${c.fiche.name}</td><td>${c.coach}</td><td>${diff} dagen</td></tr>`;
            }
        }

        function sendWA(type) {
            const c = clients[currentId];
            let msg = `Hoi ${c.fiche.name}! Hoe smaakte je shake? Ik bel je straks even op voor onze follow-up!`;
            window.open(`https://wa.me/${c.fiche.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = init;
    </script>
</body>
</html>
